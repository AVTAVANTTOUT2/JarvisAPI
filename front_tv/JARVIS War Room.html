  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: rgba(255,255,255,0.95); min-height: 24px;\">{{ overlayJarvisText }}<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- HUD corner marks on overlay -->\n    <div style=\"position: absolute; top: -1px; left: -1px; width: 16px; height: 16px; border-top: 2px solid {{ overlayBorderColor }}; border-left: 2px solid {{ overlayBorderColor }};\"><\u002Fdiv>\n    <div style=\"position: absolute; top: -1px; right: -1px; width: 16px; height: 16px; border-top: 2px solid {{ overlayBorderColor }}; border-right: 2px solid {{ overlayBorderColor }};\"><\u002Fdiv>\n    <div style=\"position: absolute; bottom: -1px; left: -1px; width: 16px; height: 16px; border-bottom: 2px solid {{ overlayBorderColor }}; border-left: 2px solid {{ overlayBorderColor }};\"><\u002Fdiv>\n    <div style=\"position: absolute; bottom: -1px; right: -1px; width: 16px; height: 16px; border-bottom: 2px solid {{ overlayBorderColor }}; border-right: 2px solid {{ overlayBorderColor }};\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════════════════════ -->\n<!-- SCANLINES OVERLAY                                             -->\n<!-- ══════════════════════════════════════════════════════════════ -->\n<sc-if value=\"{{ scanlines }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position: fixed; inset: 0; pointer-events: none; z-index: 90; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);\"><\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1920, &quot;height&quot;: 1080 },\n  &quot;scanlines&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;section&quot;: &quot;Apparence&quot; },\n  &quot;nightMode&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;section&quot;: &quot;Apparence&quot; },\n  &quot;demoOverlay&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;section&quot;: &quot;Démo&quot; }\n}\">\n\nclass Component extends DCLogic {\n\n  _DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];\n  _MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];\n  _canvasRef = React.createRef();\n  _nodes = [];\n  _pulses = [];\n  _rafId = null;\n\n  state = (() => {\n    const n = new Date();\n    return {\n      hours: String(n.getHours()).padStart(2,'0'),\n      minutes: String(n.getMinutes()).padStart(2,'0'),\n      seconds: String(n.getSeconds()).padStart(2,'0'),\n      colonVisible: true,\n      dateStr: this._DAYS[n.getDay()] + ' ' + n.getDate() + ' ' + this._MONTHS[n.getMonth()] + ' ' + n.getFullYear(),\n      burnInX: 0,\n      burnInY: 0,\n      overlayState: 'idle',\n      overlayUserText: '',\n      overlayJarvisText: '',\n    };\n  })();\n\n  componentDidMount() {\n    this._startClock();\n    this._startBurnIn();\n    this._initNeural();\n    if (this.props.demoOverlay !== false) {\n      this._demoTimeout = setTimeout(() => this._runDemoCycle(), 6000);\n    }\n  }\n\n  componentDidUpdate(prevProps) {\n    if (prevProps.demoOverlay === false && this.props.demoOverlay !== false) {\n      this._demoTimeout = setTimeout(() => this._runDemoCycle(), 3000);\n    }\n    if (prevProps.demoOverlay !== false && this.props.demoOverlay === false) {\n      this._clearDemoTimers();\n      this.setState({ overlayState: 'idle', overlayUserText: '', overlayJarvisText: '' });\n    }\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._clockInterval);\n    clearInterval(this._burnInInterval);\n    this._clearDemoTimers();\n    if (this._rafId) cancelAnimationFrame(this._rafId);\n  }\n\n  _initNeural() {\n    this._nodes = [];\n    this._pulses = [];\n    this._angleY = 0;\n    this._angleX = 0;\n    this._lastPulseTime = 0;\n    const R = 140;\n\n    // Fibonacci sphere distribution — ject(p, cx, cy, fov) {\n    const scale = fov / (fov + p.z);\n    return { x: cx + p.x * scale, y: cy + p.y * scale, s: scale, z: p.z };\n  }\n\n  _drawSphere() {\n    const cv = this._canvasRef.current;\n    if (!cv) { this._rafId = requestAnimationFrame(() => this._drawSphere()); return; }\n    const ctx = cv.getContext('2d');\n    const S = 400;\n    const CX = S / 2, CY = S / 2, FOV = 500;\n    const now = performance.now() * 0.001;\n\n    ctx.clearRect(0, 0, S, S);\n\n    // Slow rotation\n    this._angleY += 0.004;\n    this._angleX = Math.sin(now * 0.15) * 0.3;\n    const ay = this._angleY;\n    const ax = this._angleX;\n\n    // Transform all nodes\n    const nodes = this._nodes;\n    for (const n of nodes) {\n      const r = this._rot(n, ay, ax);\n      const p = this._project(r, CX, CY, FOV);\n      n.x = p.x; n.y = p.y; n.z = r.z; n.s = p.s;\n    }\n\n    // Draw orbit rings (behind sphere)\n    ctx.globalAlpha = 1;\n    for (let ri = 0; ri < this._rings.length; ri++) {\n      const ring = this._rings[ri];\n      ctx.beginPath();\n      for (let i = 0; i < ring.length; i++) {\n        const r = this._rot(ring[i], ay, ax);\n        const p = this._project(r, CX, CY, FOV);\n        if (i === 0) ctx.moveTo(p.x, p.y);\n        else ctx.lineTo(p.x, p.y);\n      }\n      ctx.closePath();\n      ctx.strokeStyle = 'rgba(0,212,255,0.06)';\n      ctx.lineWidth = 0.8;\n      ctx.stroke();\n    }\n\n    // Sort edges by average z for depth\n    const sortedEdges = this._edges.slice().sort((a, b) => {\n      const za = (nodes[a.a].z + nodes[a.b].z) / 2;\n      const zb = (nodes[b.a].z + nodes[b.b].z) / 2;\n      return za - zb;\n    });\n\n    // Draw edges\n    for (const e of sortedEdges) {\n      const na = nodes[e.a], nb = nodes[e.b];\n      const avgZ = (na.z + nb.z) / 2;\n      const depth = (avgZ + 140) / 280;\n      const alpha = 0.04 + depth * 0.2;\n      ctx.strokeStyle = 'rgba(0,212,255,' + alpha.toFixed(3) + ')';\n      ctx.lineWidth = 0.4 + depth * 0.6;\n      ctx.beginPath();\n      ctx.moveTo(na.x, na.y);\n      ctx.lineTo(nb.x, nb.y);\n      ctx.stroke();\n    }\n\n    // Spawn pulses along edges\n    if (now - this._lastPulseTime > 0.3) {\n      const ei = Math.floor(Math.random() * this._edges.length);\n      const edge = this._edges[ei];\n      this._pulses.push({ a: edge.a, b: edge.b, t: 0, speed: 0.012 + Math.random() * 0.015 });\n      if (this._pulses.length > 15) this._pulses.shift();\n      this._lastPulseTime = now;\n    }\n\n    // Draw pulses\n    for (let p = this._pulses.length - 1; p >= 0; p--) {\n      const pulse = this._pulses[p];\n      pulse.t += pulse.speed;\n      if (pulse.t > 1) { this._pulses.splice(p, 1); continue; }\n      const na = nodes[pulse.a], nb = nodes[pulse.b];\n      const px = na.x + (nb.x - na.x) * pulse.t;\n      const py = na.y + (nb.y - na.y) * pulse.t;\n      const glow = Math.sin(pulse.t * Math.PI);\n      const avgZ = (na.z + nb.z) / 2;\n      const depth = (avgZ + 140) / 280;\n\n      ctx.save();\n      ctx.shadowColor = '#00d4ff';\n      ctx.shadowBlur = 8 + glow * 12;\n      ctx.beginPath();\n      ctx.arc(px, py, 1.5 + glow * 2.5, 0, Math.PI * 2);\n      ctx.fillStyle = 'rgba(0,212,255,' + (0.5 + glow * 0.5) * (0.3 + depth * 0.7) + ')';\n      ctx.fill();\n      ctx.restore();\n    }\n\n    // Sort nodes by z for depth rendering\n    const sortedNodes = nodes.slice().sort((a, b) => a.z - b.z);\n\n    // Draw nodes\n    for (const n of sortedNodes) {\n      const depth = (n.z + 140) / 280;\n      const pulse = Math.sin(n.phase + now * 1.5) * 0.3;\n      const alpha = 0.15 + depth * 0.7 + pulse * 0.1;\n      const size = n.size * n.s * (0.6 + depth * 0.6);\n\n      ctx.save();\n      if (depth > 0.6) {\n        ctx.shadowColor = '#00d4ff';\n        ctx.shadowBlur = 6 + depth * 8;\n      }\n      ctx.beginPath();\n      ctx.arc(n.x, n.y, size, 0, Math.PI * 2);\n      ctx.fillStyle = 'rgba(0,212,255,' + Math.min(1, alpha).toFixed(3) + ')';\n      ctx.fill();\n      ctx.restore();\n\n      // Bright core on front nodes\n      if (depth > 0.7) {\n        ctx.beginPath();\n        ctx.arc(n.x, n.y, size * 0.4, 0, Math.PI * 2);\n        ctx.fillStyle = 'rgba(180,240,255,' + (depth * 0.6).toFixed(3) + ')';\n        ctx.fill();\n      }\n    }\n\n    // Center glow\n    const cGlow = 0.03 + Math.sin(now * 0.8) * 0.015;\n    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 100);\n    grad.addColorStop(0, 'rgba(0,212,255,' + cGlow + ')');\n    grad.addColorStop(1, 'rgba(0,212,255,0)');\n    ctx.fillStyle = grad;\n    ctx.fillRect(CX - 100, CY - 100, 200, 200);\n\n    this._rafId = requestAnimationFrame(() => this._drawSphere());\n  }\n\n  _startClock() {\n    this._clockInterval = setInterval(() => {\n      const n = new Date();\n      this.setState({\n        hours: String(n.getHours()).padStart(2,'0'),\n        minutes: String(n.getMinutes()).padStart(2,'0'),\n        seconds: String(n.getSeconds()).padStart(2,'0'),\n        colonVisible: n.getSeconds() % 2 === 0,\n        dateStr: this._DAYS[n.getDay()] + ' ' + n.getDate() + ' ' + this._MONTHS[n.getMonth()] + ' ' + n.getFullYear(),\n      });\n    }, 1000);\n  }\n\n  _startBurnIn() {\n    this._burnInInterval = setInterval(() => {\n      this.setState({\n        burnInX: Math.round((Math.random() - 0.5) * 4),\n        burnInY: Math.round((Math.random() - 0.5) * 4),\n      });\n    }, 5 * 60 * 1000);\n  }\n\n  _clearDemoTimers() {\n    clearTimeout(this._demoTimeout);\n    clearTimeout(this._dt1);\n    clearTimeout(this._dt2);\n    clearTimeout(this._dt3);\n    clearTimeout(this._dt4);\n    clearTimeout(this._dt5);\n  }\n\n  _runDemoCycle() {\n    this._clearDemoTimers();\n    this.setState({ overlayState: 'listening', overlayUserText: '', overlayJarvisText: '' });\n    this._dt1 = setTimeout(() => {\n      this.setState({ overlayUserText: 'Quel temps fait-il ?' });\n    }, 2000);\n    this._dt2 = setTimeout(() => {\n      this.setState({ overlayState: 'processing', overlayUserText: 'Quel temps fait-il ?' });\n    }, 4000);\n    this._dt3 = setTimeout(() => {\n      this.setState({ overlayState: 'speaking', overlayJarvisText: 'Il fait 16°C à Lille, couvert avec quelques éclaircies cet après-midi.' });\n    }, 5500);\n    this._dt4 = setTimeout(() => {\n      this.setState({ overlayState: 'idle' });\n    }, 10500);\n    this._dt5 = setTimeout(() => {\n      if (this.props.demoOverlay !== false) {\n        this._runDemoCycle();\n      }\n    }, 25000);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const h = new Date().getHours();\n    const forceNight = this.props.nightMode ?? false;\n    const isDimmed = forceNight || (h >= 23 || h < 7);\n\n    const orbColors = { listening: '#00d4ff', processing: '#a855f7', speaking: '#f59e0b' };\n    const orbLabels = { listening: 'ÉCOUTE', processing: 'TRAITEMENT', speaking: 'JARVIS PARLE' };\n    const orbShort = { listening: 'RX', processing: '...', speaking: 'TX' };\n    const oc = orbColors[s.overlayState] || '#00d4ff';\n    const isOverlayVisible = s.overlayState !== 'idle';\n\n    return {\n      hours: s.hours,\n      minutes: s.minutes,\n      seconds: s.seconds,\n      colonOpacity: s.colonVisible ? 1 : 0.15,\n      dateStr: s.dateStr,\n      dashboardOpacity: isDimmed ? 0.3 : 1,\n      dashboardTransform: 'translate(' + s.burnInX + 'px, ' + s.burnInY + 'px)',\n      overlayOpacity: isOverlayVisible ? 1 : 0,\n      orbColor: oc,\n      orbShadow: isOverlayVisible ? '0 0 20px ' + oc + ', 0 0 48px ' + oc + '40' : 'none',\n      orbLabel: orbLabels[s.overlayState] || '',\n      overlayStateShort: orbShort[s.overlayState] || '',\n      overlayBorderColor: isOverlayVisible ? oc + '40' : 'rgba(255,255,255,0.06)',\n      overlayUserText: s.overlayUserText,\n      overlayJarvisText: s.overlayJarvisText,\n      scanlines: this.props.scanlines ?? true,\n      canvasRef: this._canvasRef,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
